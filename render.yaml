services:
  # Backend Web Service
  - type: web
    name: redia-io-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # Set this in Render dashboard
      - key: JWT_SECRET
        sync: false # Set this in Render dashboard

  # Frontend Static Site
  - type: static
    name: redia-io-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install; npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: redia-io-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
